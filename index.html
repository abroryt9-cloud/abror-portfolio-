<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аброр • Космический Dev</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            color: white;
        }

        /* 3D сцена */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Контент поверх */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        .content * {
            pointer-events: auto;
        }

        /* Главный ник */
        h1 {
            font-size: clamp(2.2rem, 12vw, 5rem);
            margin-bottom: 10px;
            text-shadow: 
                0 0 20px cyan,
                0 0 40px blue,
                0 0 80px purple;
            letter-spacing: 4px;
            animation: fadeInDown 1.5s ease-out;
            font-weight: 800;
        }

        .subtitle {
            font-size: clamp(1rem, 4vw, 1.5rem);
            margin-bottom: 40px;
            opacity: 0.9;
            text-shadow: 0 0 10px white;
            letter-spacing: 2px;
            animation: fadeInUp 1.5s ease-out 0.3s both;
        }

        /* Кнопки — 3D стиль */
        .button-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1.5s ease-out 0.6s both;
        }

        .btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            color: white;
            transform-style: preserve-3d;
            transform: perspective(500px) rotateX(0deg);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            transform: perspective(500px) rotateX(5deg) translateY(-5px) scale(1.05);
            box-shadow: 0 20px 30px rgba(0,255,255,0.5);
            border-color: cyan;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: perspective(500px) rotateX(-5deg) translateY(2px) scale(0.98);
            box-shadow: 0 5px 15px rgba(255,0,255,0.7);
            transition: 0.1s;
        }

        /* Индивидуальные цвета */
        .btn-telegram { background: rgba(0, 100, 200, 0.7); }
        .btn-github { background: rgba(50, 50, 50, 0.8); }
        .btn-portfolio { background: rgba(150, 0, 255, 0.7); }

        /* Анимации */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптация под телефон */
        @media (max-width: 600px) {
            .button-container {
                gap: 15px;
                flex-direction: column;
                width: 100%;
            }
            .btn {
                width: 100%;
                padding: 14px 0;
                font-size: 1rem;
            }
            h1 {
                font-size: 2.5rem;
            }
        }

        /* Временное сообщение */
        .portfolio-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: cyan;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid cyan;
            box-shadow: 0 0 20px cyan;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
            font-weight: 500;
        }

        .portfolio-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 3D контейнер -->
    <div id="canvas-container"></div>

    <!-- Временное сообщение для портфолио -->
    <div class="portfolio-message" id="portfolioMessage">🚀 Портфолио скоро появится!</div>

    <!-- Контент -->
    <div class="content">
        <h1>@Abrortg_com</h1>
        <div class="subtitle">Python • n8n • Telegram Bots</div>
        <div class="button-container">
            <button class="btn btn-telegram" id="telegramBtn">Telegram</button>
            <button class="btn btn-github" id="githubBtn">GitHub</button>
            <button class="btn btn-portfolio" id="portfolioBtn">Портфолио</button>
        </div>
    </div>

    <!-- Библиотеки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <!-- 3D скрипт -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        // Камера
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 15);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Свет
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Луна
        const moonGeometry = new THREE.SphereGeometry(2, 64, 64);
        const moonMaterial = new THREE.MeshPhongMaterial({
            color: 0xcccccc,
            emissive: 0x222233,
            shininess: 30,
            bumpMap: new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/moon_1024.jpg'),
            bumpScale: 0.05
        });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        moon.position.set(-3, 1, -5);
        moon.castShadow = true;
        moon.receiveShadow = true;
        scene.add(moon);

        // Звёзды
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 200;
            starsPositions[i+1] = (Math.random() - 0.5) * 200;
            starsPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Планеты вдалеке
        const planetGeo = new THREE.SphereGeometry(0.5, 32);
        const planetMat = new THREE.MeshPhongMaterial({ color: 0x88aaff, emissive: 0x113366 });
        const planet1 = new THREE.Mesh(planetGeo, planetMat);
        planet1.position.set(5, -1, -12);
        scene.add(planet1);

        const planetMat2 = new THREE.MeshPhongMaterial({ color: 0xffaa88, emissive: 0x442211 });
        const planet2 = new THREE.Mesh(planetGeo, planetMat2);
        planet2.position.set(-6, -2, -15);
        scene.add(planet2);

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            // Вращение луны
            moon.rotation.y += 0.001;
            moon.rotation.x += 0.0005;

            // Вращение звёзд
            stars.rotation.y += 0.0002;

            // Планеты вращаются
            planet1.rotation.y += 0.002;
            planet2.rotation.y -= 0.0015;

            renderer.render(scene, camera);
        }
        animate();

        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Легкое движение камеры за мышкой
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            const mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 2 - camera.position.y) * 0.02;
            camera.lookAt(0, 1, -3);
        });
    </script>

    <!-- Логика кнопок -->
    <script>
        const tgBtn = document.getElementById('telegramBtn');
        const ghBtn = document.getElementById('githubBtn');
        const pfBtn = document.getElementById('portfolioBtn');
        const msg = document.getElementById('portfolioMessage');

        tgBtn.addEventListener('click', () => {
            window.open('https://t.me/Abrortg_com', '_blank');
        });

        ghBtn.addEventListener('click', () => {
            window.open('https://github.com/abroryt9-cloud', '_blank');
        });

        pfBtn.addEventListener('click', () => {
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        });
    </script>
</body>
</html>
